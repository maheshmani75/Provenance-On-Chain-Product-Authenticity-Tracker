name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Smart contracts — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build transfer-log contract (wasm) — required by registry contractimport!
        run: cargo build --target wasm32v1-none --release -p transfer-log

      - name: Build product-registry contract (wasm)
        run: cargo build --target wasm32v1-none --release -p product-registry

      - name: Run contract tests
        run: cargo test --workspace --verbose 2>&1 | tail -60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Frontend — lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

  deploy-preview:
    name: Deployment readiness check
    needs: [contracts, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "Contracts and frontend are verified — ready for testnet deployment / Vercel preview."
